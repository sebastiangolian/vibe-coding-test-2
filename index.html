<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vibe-coding-test-2</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #f8fafc;
  }
  main {
    text-align: center;
    padding: 2rem;
  }
  h1 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
  }
  p {
    color: #94a3b8;
  }
  #cat-box {
    margin-top: 2rem;
  }
  #cat-box img {
    width: 320px;
    height: 320px;
    object-fit: cover;
    border-radius: 1rem;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
  }
</style>
</head>
<body>
<main>
  <h1>vibe-coding-test-2</h1>
  <div id="cat-box">
    <img id="cat-image" src="" alt="Losowy kotek">
  </div>
</main>
<script>
  const catImage = document.getElementById("cat-image");

  function loadRandomCat() {
    catImage.src = `https://cataas.com/cat?_=${Date.now()}`;
  }

  loadRandomCat();
  setInterval(loadRandomCat, 5000);
</script>
</body>
</html>
